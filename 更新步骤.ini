具体步骤（看图操作）：
保存文件：
在 Cursor 里修改完代码后，记得按 Ctrl + S (Windows) 或 Cmd + S (Mac) 保存文件。
打开“源代码管理”面板：
看 Cursor 左侧的侧边栏，找到一个“树杈形状”的图标（通常是第 3 个），鼠标悬停会显示 "Source Control" 或 "源代码管理"。点击它。
提交 (Commit)：
您会看到一个输入框（Message / 消息）。
输入备注：在框里随便写点什么，比如“修改了首页标题”或“update”。
点击提交：点击输入框上面的蓝色按钮 Commit（或者是一个“对号 √”图标）。
(如果弹出提示问是否要 Stage changes，选 "Yes" 或 "Always")
同步 (Sync / Push)：
提交成功后，那个蓝色按钮通常会变成 Sync Changes（同步更改）。
点击它！
(如果没变，可以点击面板右上角的三个点 ...，选择 Push)
接下来会发生什么？
GitHub：您的代码现在已经更新到 GitHub 仓库了。
Vercel：Vercel 的服务器 24 小时盯着您的 GitHub。一旦发现有新的 Push，它会立即自动开始新一轮的构建和部署。
结果：您只需要等待 1-2 分钟，刷新您的 bryanfinal.xyz，修改的内容就会自动出现！
总结： 改代码 -> Cursor 里点“提交” -> 点“同步” -> 喝口水 -> 刷新网页。就这么简单！